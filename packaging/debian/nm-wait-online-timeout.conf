# Installed by the openfollow package as a drop-in for
# NetworkManager-wait-online.service.
#
# openfollow.service is ordered After=network-online.target so the app binds a
# real LAN address (not loopback) for its web UI, PSN beacon and discovery. But
# the stock NetworkManager-wait-online (nm-online -s, ~60s default) holds
# network-online.target – and therefore the kiosk GUI behind the boot splash –
# for up to a minute on a slow or network-less boot. The app already does its
# own short (~10s) network-readiness wait once started, on the assumption that
# this bounded wait ran first; cap it at 20s so a network-less boot reaches the
# UI promptly instead of sitting on the splash.
[Service]
ExecStart=
ExecStart=/usr/bin/nm-online -s -q --timeout=20
