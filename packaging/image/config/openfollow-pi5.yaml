# rpi-image-gen config: OpenFollow appliance image for the standard Raspberry Pi 5.
# OpenFollow appliance image – Raspberry Pi 5 (standard board, SD card), Pi OS Lite (Trixie).
#
# Same headless Cage Wayland kiosk appliance as the CM5 image, targeting the STANDARD
# Pi 5 board booting from SD. All the shared appliance config (the `openfollow`
# account, image size, custom layer, .deb path) lives in openfollow-common.yaml –
# only the device layer and image name differ per board.
#
# Build (run natively on an arm64 Pi; CI does this on the self-hosted runner):
#   cp dist/openfollow_*_arm64.deb packaging/image/openfollow.deb
#   rpi-image-gen build -S packaging/image -c openfollow-pi5.yaml
# Output: <rpi-image-gen>/work/image-openfollow-pi5/openfollow-pi5.img
include:
  file: openfollow-common.yaml

device:
  layer: rpi5                        # standard Pi 5 device layer: 2712 kernel, default storage_type=sd

image:
  name: openfollow-pi5
